<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ytfromdl</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --card: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.08); --card-hover: rgba(255,255,255,0.08);
      --text: #f0f0f0; --muted: rgba(255,255,255,0.35);
      --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.35);
      --red: #ef4444; --radius: 16px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 20px 100px; position: relative; overflow-x: hidden;
    }
    .blob { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; opacity: 0.15; }
    .blob-1 { width: 600px; height: 600px; background: #1d4ed8; top: -150px; left: -200px; }
    .blob-2 { width: 500px; height: 500px; background: #6d28d9; bottom: -100px; right: -150px; }
    .container { width: 100%; max-width: 560px; position: relative; z-index: 1; }

    /* HEADER */
    header { margin-bottom: 28px; animation: fadeUp 0.5s ease both; }
    .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 0 20px var(--accent-glow); }
    .logo-icon svg { width: 18px; height: 18px; fill: #fff; }
    h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .subtitle { font-size: 13px; color: var(--muted); padding-left: 48px; }

    /* ═══ RANK CARD ═══ */
    .rank-card {
      border-radius: 20px; padding: 22px 22px 18px;
      margin-bottom: 16px; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      animation: fadeUp 0.5s ease 0.05s both; position: relative; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      transition: border-color 0.6s, box-shadow 0.6s;
      background: rgba(255,255,255,0.04);
    }
    .rank-card-glow {
      position: absolute; inset: 0; opacity: 0.06; pointer-events: none;
      transition: opacity 0.6s;
    }
    .rank-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .rank-left { display: flex; align-items: center; gap: 16px; }
    .rank-icon-wrap { width: 68px; height: 68px; flex-shrink: 0; transition: filter 0.6s; }
    .rank-icon-wrap svg { width: 100%; height: 100%; }
    .rank-icon-wrap.pop { animation: iconPop 0.65s cubic-bezier(0.175,0.885,0.32,1.4) forwards; }
    .rank-info { }
    .rank-tier-label { font-size: 9px; font-weight: 800; letter-spacing: 3.5px; text-transform: uppercase; opacity: 0.4; margin-bottom: 4px; }
    .rank-name { font-size: 22px; font-weight: 900; letter-spacing: -0.8px; transition: color 0.5s; line-height: 1; }
    .rank-sub { font-size: 11px; color: var(--muted); margin-top: 5px; }
    .rank-right { text-align: right; }
    .rank-dl-num { font-size: 36px; font-weight: 900; line-height: 1; letter-spacing: -1px; }
    .rank-dl-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

    /* Pip bars */
    .rank-pips { display: flex; gap: 6px; margin-bottom: 14px; }
    .pip { height: 5px; flex: 1; border-radius: 100px; background: rgba(255,255,255,0.09); transition: background 0.5s, box-shadow 0.5s; }

    /* XP Bar */
    .xp-bar-track { background: rgba(255,255,255,0.07); border-radius: 100px; height: 10px; overflow: hidden; position: relative; }
    .xp-bar-fill { height: 100%; border-radius: 100px; position: relative; transition: width 1.3s cubic-bezier(0.22,1,0.36,1); min-width: 6px; }
    .xp-bar-fill::after { content: ''; position: absolute; top: 0; left: -100%; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent); animation: shimmer 2.2s infinite; }
    .xp-bar-labels { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: var(--muted); }

    /* ═══ FORTNITE-STYLE RANK UP SCREEN ═══ */
    .rankup-overlay {
      position: fixed; inset: 0; z-index: 900;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: all; overflow: hidden;
    }
    .rankup-overlay.active { display: flex; }

    /* Dim background */
    .rankup-bg {
      position: absolute; inset: 0;
      background: rgba(4,4,10,0.92);
      backdrop-filter: blur(4px);
    }

    /* Phase 1 — XP bar at bottom filling up */
    .ru-phase1 {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 80px; z-index: 2;
    }
    .ru-xp-label {
      font-size: 13px; font-weight: 800; letter-spacing: 4px;
      text-transform: uppercase; color: rgba(255,255,255,0.4);
      margin-bottom: 16px;
    }
    .ru-bar-wrap {
      width: min(480px, 85vw); height: 16px;
      background: rgba(255,255,255,0.08); border-radius: 100px;
      overflow: hidden; position: relative;
    }
    .ru-bar-fill {
      height: 100%; width: 0%; border-radius: 100px;
      transition: width 1.8s cubic-bezier(0.3, 0, 0.1, 1);
      position: relative;
    }
    .ru-bar-fill::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.55) 50%, transparent 100%);
      animation: shimmer 1.4s infinite;
    }
    .ru-bar-dot {
      position: absolute; top: 50%; right: -1px;
      transform: translateY(-50%);
      width: 20px; height: 20px; border-radius: 50%;
      filter: blur(6px);
    }
    .ru-gain-text {
      font-size: 32px; font-weight: 900; letter-spacing: -1px;
      margin-top: 20px; opacity: 0;
      animation: gainPop 0.5s cubic-bezier(0.175,0.885,0.32,1.4) 0.3s forwards;
    }

    /* Flash overlay when bar hits 100% */
    .ru-flash {
      position: absolute; inset: 0; z-index: 3;
      background: #fff; opacity: 0; pointer-events: none;
    }
    .ru-flash.bang { animation: flashBang 0.5s ease forwards; }

    /* Phase 2 — rank reveal */
    .ru-phase2 {
      position: absolute; inset: 0; z-index: 4;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
    }
    .ru-phase2.show { opacity: 1; pointer-events: all; }

    /* Shockwave rings */
    .ru-ring {
      position: absolute; border-radius: 50%;
      width: 20px; height: 20px;
      border: 3px solid var(--rc, #ffd700);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0; pointer-events: none;
    }
    .ru-ring.go { animation: ringExpand var(--rd, 0.9s) ease forwards; }

    /* Background radial glow */
    .ru-bg-glow {
      position: absolute; width: 600px; height: 600px;
      border-radius: 50%; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      filter: blur(100px); opacity: 0; pointer-events: none;
    }
    .ru-bg-glow.show { animation: bgGlowIn 0.8s ease 0.1s forwards; }

    /* Icon container */
    .ru-icon-wrap {
      width: 150px; height: 150px; position: relative; z-index: 2;
      opacity: 0; margin-bottom: 28px;
    }
    .ru-icon-wrap svg { width: 100%; height: 100%; }
    .ru-icon-wrap.slam { animation: iconSlam 0.7s cubic-bezier(0.175,0.885,0.32,1.5) forwards; }

    .ru-rank-up-text {
      font-size: 11px; font-weight: 900; letter-spacing: 7px;
      text-transform: uppercase; opacity: 0; color: rgba(255,255,255,0.45);
      margin-bottom: 10px;
    }
    .ru-rank-up-text.show { animation: fadeUp 0.5s ease 0.35s forwards; }

    .ru-rank-name {
      font-size: 52px; font-weight: 900; letter-spacing: -2.5px;
      opacity: 0; line-height: 1;
    }
    .ru-rank-name.show { animation: nameSlide 0.6s cubic-bezier(0.22,1,0.36,1) 0.45s forwards; }

    .ru-tap-hint {
      position: absolute; bottom: 40px;
      font-size: 12px; opacity: 0; letter-spacing: 1.5px;
      text-transform: uppercase; color: rgba(255,255,255,0.25);
      animation: fadeUp 0.5s ease 1.2s forwards;
    }

    @keyframes flashBang {
      0%   { opacity: 0.9; }
      100% { opacity: 0; }
    }
    @keyframes ringExpand {
      0%   { transform: translate(-50%,-50%) scale(0); opacity: 0.9; }
      100% { transform: translate(-50%,-50%) scale(18); opacity: 0; }
    }
    @keyframes bgGlowIn {
      0%   { opacity: 0; }
      100% { opacity: 0.28; }
    }
    @keyframes iconSlam {
      0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
      55%  { transform: scale(1.28) rotate(4deg); opacity: 1; }
      75%  { transform: scale(0.91) rotate(-2deg); opacity: 1; }
      90%  { transform: scale(1.06); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes nameSlide {
      0%   { opacity: 0; transform: translateY(22px) scale(0.85); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes gainPop {
      0%   { opacity: 0; transform: scale(0.5) translateY(10px); }
      70%  { opacity: 1; transform: scale(1.1) translateY(-2px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes glowPulse { from { opacity: 0.2; } to { opacity: 0.4; } }

    /* ═══ TOAST ═══ */
    .levelup-toast {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-140px);
      border-radius: 18px; padding: 14px 24px 14px 14px;
      display: flex; align-items: center; gap: 14px; z-index: 1000;
      transition: transform 0.6s cubic-bezier(0.175,0.885,0.32,1.275);
      box-shadow: 0 16px 48px rgba(0,0,0,0.8); white-space: nowrap;
      background: #111118; border: 1px solid rgba(255,255,255,0.12);
    }
    .levelup-toast.show { transform: translateX(-50%) translateY(0); }
    .toast-icon { width: 48px; height: 48px; flex-shrink: 0; }
    .toast-icon svg { width: 100%; height: 100%; }
    .toast-label { font-size: 9px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; opacity: 0.45; }
    .toast-name { font-size: 20px; font-weight: 900; margin-top: 2px; }

    /* XP Float + Particles */
    .xp-popup { position: fixed; pointer-events: none; z-index: 999; font-size: 22px; font-weight: 900; letter-spacing: -0.5px; animation: xpFloat 1.5s cubic-bezier(0.22,1,0.36,1) forwards; opacity: 0; }
    .particle { position: fixed; pointer-events: none; z-index: 998; border-radius: 50%; animation: particleFly var(--dur,0.9s) ease forwards; opacity: 0; }

    /* Duplicate warning */
    .dup-warning { font-size: 12px; color: #f59e0b; display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); border-radius: 8px; margin-bottom: 8px; display: none; }

    /* SEARCH */
    .search-card { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 20px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); margin-bottom: 12px; animation: fadeUp 0.5s ease 0.15s both; }
    .input-row { display: flex; gap: 10px; }
    input[type="text"] { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 16px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s, background 0.2s; }
    input[type="text"]:focus { border-color: var(--accent); background: rgba(59,130,246,0.07); }
    input::placeholder { color: var(--muted); }
    .fetch-btn { background: var(--accent); border: none; border-radius: 10px; padding: 12px 22px; font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; color: #fff; cursor: pointer; white-space: nowrap; transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s; box-shadow: 0 4px 16px var(--accent-glow); }
    .fetch-btn:hover { opacity: 0.88; }
    .fetch-btn:active { transform: scale(0.97); }
    .fetch-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
    .status { font-size: 13px; color: var(--muted); min-height: 18px; display: flex; align-items: center; gap: 8px; padding: 0 4px; margin-bottom: 20px; }
    .status.error { color: var(--red); }
    .spinner { width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }

    /* RESULTS */
    .result-panel { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius); overflow: hidden; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: none; animation: fadeUp 0.35s ease both; }
    .result-panel.visible { display: block; }
    .video-info { display: flex; gap: 14px; padding: 18px 18px 16px; border-bottom: 1px solid var(--card-border); }
    .video-thumb { width: 118px; height: 66px; object-fit: cover; border-radius: 8px; flex-shrink: 0; background: rgba(255,255,255,0.06); }
    .video-meta { flex: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: center; gap: 5px; }
    .video-title { font-size: 14px; font-weight: 500; line-height: 1.45; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .video-duration { font-size: 12px; color: var(--muted); }
    .formats-header { padding: 16px 18px 8px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .formats-list { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 5px; }
    .format-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; transition: background 0.15s, border-color 0.15s; }
    .format-row:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.12); }
    .format-info { display: flex; align-items: center; gap: 10px; }
    .format-quality { font-size: 13px; font-weight: 700; color: var(--text); min-width: 40px; }
    .format-tag { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 5px; background: rgba(59,130,246,0.15); color: #60a5fa; }
    .dl-btn { padding: 7px 16px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-block; transition: background 0.15s, color 0.15s, border-color 0.15s; white-space: nowrap; }
    .dl-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .note { margin-top: 16px; font-size: 12px; color: rgba(255,255,255,0.15); text-align: center; }

    /* ANIMATIONS */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer { to { left: 200%; } }
    @keyframes iconPop {
      0%   { transform: scale(1) rotate(0deg); }
      20%  { transform: scale(0.75) rotate(-12deg); }
      55%  { transform: scale(1.65) rotate(10deg); }
      75%  { transform: scale(0.93) rotate(-4deg); }
      90%  { transform: scale(1.06) rotate(2deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    @keyframes xpFloat {
      0%   { opacity: 0; transform: translateY(8px) scale(0.6); }
      12%  { opacity: 1; transform: translateY(0) scale(1.15); }
      55%  { opacity: 1; transform: translateY(-60px) scale(1.05); }
      100% { opacity: 0; transform: translateY(-100px) scale(0.7); }
    }
    @keyframes particleFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1.2); }
      100% { opacity: 0; transform: translate(var(--tx,0px), var(--ty,-80px)) scale(0); }
    }
    @keyframes rankIconSpin {
      0%   { transform: scale(0) rotate(-180deg); opacity: 0; filter: brightness(3); }
      50%  { transform: scale(1.2) rotate(10deg); opacity: 1; filter: brightness(1.5); }
      75%  { transform: scale(0.92) rotate(-5deg); filter: brightness(1); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; filter: brightness(1); }
    }
    @keyframes cardGlow {
      0%   { box-shadow: 0 0 0 0 var(--rc, gold); }
      35%  { box-shadow: 0 0 40px 10px var(--rc, gold); }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
    .rank-card.pulse { animation: cardGlow 1s ease forwards; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!-- Rank up full-screen overlay -->
  <div class="rankup-overlay" id="rankupOverlay">
    <div class="rankup-bg"></div>

    <!-- Phase 1: XP bar filling at bottom -->
    <div class="ru-phase1" id="ruPhase1">
      <div class="ru-xp-label">Ranking Up</div>
      <div class="ru-bar-wrap">
        <div class="ru-bar-fill" id="ruBarFill">
          <div class="ru-bar-dot" id="ruBarDot"></div>
        </div>
      </div>
      <div class="ru-gain-text" id="ruGainText">+10 XP</div>
    </div>

    <!-- Flash on bar complete -->
    <div class="ru-flash" id="ruFlash"></div>

    <!-- Phase 2: Reveal -->
    <div class="ru-phase2" id="ruPhase2">
      <div class="ru-bg-glow" id="ruBgGlow"></div>
      <div class="ru-ring" id="ruRing1" style="--rd:0.8s"></div>
      <div class="ru-ring" id="ruRing2" style="--rd:1.1s"></div>
      <div class="ru-ring" id="ruRing3" style="--rd:1.4s"></div>
      <div class="ru-icon-wrap" id="ruIcon"></div>
      <div class="ru-rank-up-text" id="ruLabel">Rank Up!</div>
      <div class="ru-rank-name" id="ruName"></div>
      <div class="ru-tap-hint">Tap to continue</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="levelup-toast" id="levelupToast">
    <div class="toast-icon" id="toastIcon"></div>
    <div>
      <div class="toast-label">Rank Up!</div>
      <div class="toast-name" id="toastName"></div>
    </div>
  </div>

  <div class="container">
    <header>
      <div class="logo-row">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M19.59 7a2.4 2.4 0 0 0-1.69-1.7C16.46 5 12 5 12 5s-4.46 0-5.9.3A2.4 2.4 0 0 0 4.41 7 25 25 0 0 0 4 12a25 25 0 0 0 .41 5 2.4 2.4 0 0 0 1.69 1.7C7.54 19 12 19 12 19s4.46 0 5.9-.3A2.4 2.4 0 0 0 19.59 17 25 25 0 0 0 20 12a25 25 0 0 0-.41-5zM10 15V9l5 3-5 3z"/></svg>
        </div>
        <h1>Ytfromdl</h1>
      </div>
      <p class="subtitle">Paste any YouTube link to get download options</p>
    </header>

    <!-- Rank card -->
    <div class="rank-card" id="rankCard">
      <div class="rank-card-glow" id="rankCardGlow"></div>
      <div class="rank-top">
        <div class="rank-left">
          <div class="rank-icon-wrap" id="rankIconWrap"></div>
          <div class="rank-info">
            <div class="rank-tier-label" id="rankTierLabel">Bronze</div>
            <div class="rank-name" id="rankName">Bronze I</div>
            <div class="rank-sub" id="rankSub">0 XP • 0 downloads</div>
          </div>
        </div>
        <div class="rank-right">
          <div class="rank-dl-num" id="dlCount">0</div>
          <div class="rank-dl-label">Downloads</div>
        </div>
      </div>
      <div class="rank-pips" id="rankPips"></div>
      <div class="xp-bar-track">
        <div class="xp-bar-fill" id="xpBarFill" style="width:0%"></div>
      </div>
      <div class="xp-bar-labels">
        <span id="xpLabel">0 / 5 XP</span>
        <span id="xpNext">5 XP to next rank</span>
      </div>
    </div>

    <div class="dup-warning" id="dupWarning">⚠️ Already downloaded — no XP awarded</div>

    <div class="search-card">
      <div class="input-row">
        <input type="text" id="urlInput" placeholder="https://youtube.com/watch?v=..."/>
        <button class="fetch-btn" id="fetchBtn" onclick="fetchVideo()">Get links</button>
      </div>
    </div>
    <div class="status" id="status"></div>

    <div class="result-panel" id="resultPanel">
      <div class="video-info">
        <img class="video-thumb" id="thumb" src="" alt=""/>
        <div class="video-meta">
          <div class="video-title" id="videoTitle"></div>
          <div class="video-duration" id="videoDuration"></div>
        </div>
      </div>
      <div class="formats-header">Available formats</div>
      <div class="formats-list" id="formatsGrid"></div>
    </div>

    <p class="note">Only download content you have the right to use.</p>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────
    const RAPIDAPI_KEYS = [
      "7fc93518d0msh49d3769e1ac4936p13973ajsn44efe8afd038",
    ];
    // ─────────────────────────────────────────────────────────────

    // ══════════════════════════════════════════════════════════════
    //  UNIQUE SVG ICON FOR EVERY SINGLE RANK (18 total)
    // ══════════════════════════════════════════════════════════════
    const RANK_ICONS = {

      // ── BRONZE: rotated nested squares, dark outer → glowing center ──
      'Bronze I': `<svg viewBox="0 0 64 64" fill="none">
        <defs>

    const TIERS = [
      { label: 'Bronze',   color: '#cd7f32', glow: 'rgba(205,127,50,0.5)',  bar: 'linear-gradient(90deg,#8b4513,#cd7f32)',  xp: [500,   1000,  2000]  },

    ];

    const RANKS = [];
    const NUMS = ['I','II','III'];
    TIERS.forEach(t => {
      NUMS.forEach((num, i) => {
        RANKS.push({ name: `${t.label} ${num}`, tier: t.label, tierIdx: TIERS.indexOf(t), subIdx: i, color: t.color, glow: t.glow, bar: t.bar, xpNeeded: t.xp[i] });
      });
    });

    // ── STAT HELPERS ─────────────────────────────────────────────
    function getStats() {
      return {
        xp: parseInt(localStorage.getItem('ytdl_xp')||'0'),
        downloads: parseInt(localStorage.getItem('ytdl_downloads')||'0'),
        history: JSON.parse(localStorage.getItem('ytdl_history')||'[]'),
      };
    }
    function saveStats(xp, downloads, history) {
      localStorage.setItem('ytdl_xp', xp);
      localStorage.setItem('ytdl_downloads', downloads);
      localStorage.setItem('ytdl_history', JSON.stringify(history));
    }
    function getRankIdx(xp) {
      let cum = 0;
      for (let i = 0; i < RANKS.length; i++) {
        cum += RANKS[i].xpNeeded;
        if (xp < cum) return i;
      }
      return RANKS.length - 1;
    }
    function getXpInRank(xp, idx) {
      let cum = 0;
      for (let i = 0; i < idx; i++) cum += RANKS[i].xpNeeded;
      return xp - cum;
    }

    // ── RENDER RANK ───────────────────────────────────────────────
    function renderRank(animate = false) {
      const { xp, downloads } = getStats();
      const idx = getRankIdx(xp);
      const rank = RANKS[idx];
      const xpIn = getXpInRank(xp, idx);
      const pct = rank.xpNeeded >= 99999999 ? 100 : Math.min(100, (xpIn / rank.xpNeeded) * 100);
      const left = rank.xpNeeded >= 99999999 ? '∞' : rank.xpNeeded - xpIn;

      // Text
      document.getElementById('rankTierLabel').textContent = rank.tier;
      document.getElementById('rankName').textContent = rank.name;
      document.getElementById('rankName').style.color = rank.color;
      document.getElementById('rankSub').textContent = `${formatXP(xp)} XP • ${downloads} downloads`;
      document.getElementById('dlCount').textContent = downloads;
      document.getElementById('xpLabel').textContent = `${formatXP(xpIn)} / ${rank.xpNeeded >= 99999999 ? '∞' : formatXP(rank.xpNeeded)} XP`;
      document.getElementById('xpNext').textContent = rank.xpNeeded >= 99999999 ? '👑 MAX RANK' : `${formatXP(left)} XP to next`;

      // XP bar
      const fill = document.getElementById('xpBarFill');
      fill.style.background = rank.bar;
      fill.style.boxShadow = `0 0 14px ${rank.glow}`;
      fill.style.width = pct + '%';

      // Card
      const card = document.getElementById('rankCard');
      card.style.setProperty('--rc', rank.color);
      card.style.borderColor = rank.color + '44';

      // Card glow bg
      const glow = document.getElementById('rankCardGlow');
      glow.style.background = `radial-gradient(ellipse at 20% 20%, ${rank.color}, transparent 65%)`;

      // Icon
      const iconWrap = document.getElementById('rankIconWrap');
      iconWrap.innerHTML = RANK_ICONS[rank.name] || RANK_ICONS['Bronze I'];
      iconWrap.style.filter = `drop-shadow(0 0 12px ${rank.glow})`;

      // Pips (3 bars for I/II/III)
      const pipsEl = document.getElementById('rankPips');
      pipsEl.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const p = document.createElement('div');
        p.className = 'pip';
        if (i <= rank.subIdx) {
          p.style.background = rank.bar;
          p.style.boxShadow = `0 0 8px ${rank.glow}`;
        }
        pipsEl.appendChild(p);
      }

      if (animate) {
        iconWrap.classList.remove('pop');
        void iconWrap.offsetWidth;
        iconWrap.classList.add('pop');
        card.classList.remove('pulse');
        void card.offsetWidth;
        card.classList.add('pulse');
      }
    }

    // ── XP POPUP + PARTICLES ──────────────────────────────────────
    function spawnXpPopup(xp, color) {
      const el = document.createElement('div');
      el.className = 'xp-popup';
      el.textContent = `+${xp} XP`;
      el.style.color = color;
      el.style.textShadow = `0 0 16px ${color}`;
      el.style.left = (150 + Math.random() * 200) + 'px';
      el.style.top = '340px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1600);
    }

    function spawnParticles(color) {
      for (let i = 0; i < 14; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = (i / 14) * 360;
        const dist = 40 + Math.random() * 60;
        const tx = Math.cos(angle * Math.PI / 180) * dist;
        const ty = Math.sin(angle * Math.PI / 180) * dist - 40;
        p.style.setProperty('--tx', tx + 'px');
        p.style.setProperty('--ty', ty + 'px');
        p.style.setProperty('--dur', (0.6 + Math.random() * 0.6) + 's');
        p.style.background = color;
        p.style.width = p.style.height = (4 + Math.random() * 5) + 'px';
        p.style.left = (180 + Math.random() * 160) + 'px';
        p.style.top = '390px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1300);
      }
    }

    // ── RANK UP OVERLAY — FORTNITE STYLE ─────────────────────────
    function showRankUpOverlay(rank, xpGained) {
      const overlay  = document.getElementById('rankupOverlay');
      const phase1   = document.getElementById('ruPhase1');
      const phase2   = document.getElementById('ruPhase2');
      const barFill  = document.getElementById('ruBarFill');
      const barDot   = document.getElementById('ruBarDot');
      const gainText = document.getElementById('ruGainText');
      const flash    = document.getElementById('ruFlash');
      const bgGlow   = document.getElementById('ruBgGlow');
      const icon     = document.getElementById('ruIcon');
      const label    = document.getElementById('ruLabel');
      const nameEl   = document.getElementById('ruName');
      const rings    = [document.getElementById('ruRing1'), document.getElementById('ruRing2'), document.getElementById('ruRing3')];

      // ── RESET ──
      overlay.className = 'rankup-overlay active';
      phase1.style.opacity = '1';
      phase2.classList.remove('show');
      flash.classList.remove('bang');
      bgGlow.classList.remove('show');
      icon.classList.remove('slam');
      label.classList.remove('show');
      nameEl.classList.remove('show');
      rings.forEach(r => { r.classList.remove('go'); r.style.setProperty('--rc', rank.color); });
      barFill.style.transition = 'none';
      barFill.style.width = '0%';

      // ── SETUP COLORS ──
      barFill.style.background = rank.bar;
      barFill.style.boxShadow = `0 0 16px ${rank.glow}`;
      barDot.style.background = rank.color;
      gainText.textContent = `+${formatXP(xpGained)} XP`;
      gainText.style.color = rank.color;
      bgGlow.style.background = rank.color;
      nameEl.textContent = rank.name;
      nameEl.style.color = rank.color;
      icon.innerHTML = RANK_ICONS[rank.name] || '';
      icon.style.filter = `drop-shadow(0 0 30px ${rank.glow})`;

      // ── PHASE 1: Fill bar (1.8s) ──
      void barFill.offsetWidth;
      barFill.style.transition = 'width 1.8s cubic-bezier(0.3,0,0.1,1)';
      setTimeout(() => { barFill.style.width = '100%'; }, 80);

      // ── FLASH when bar completes ──
      setTimeout(() => {
        flash.classList.add('bang');
      }, 1900);

      // ── PHASE 2: Reveal after flash ──
      setTimeout(() => {
        phase1.style.opacity = '0';
        phase2.classList.add('show');
        bgGlow.classList.add('show');

        // Shockwave rings staggered
        rings.forEach((r, i) => {
          setTimeout(() => { r.classList.add('go'); }, i * 120);
        });

        // Icon slams in
        setTimeout(() => { icon.classList.add('slam'); }, 60);

        // Text fades in
        setTimeout(() => { label.classList.add('show'); }, 350);
        setTimeout(() => { nameEl.classList.add('show'); }, 450);

        // Particle burst
        for (let i = 0; i < 3; i++) {
          setTimeout(() => spawnParticles(rank.color), i * 150);
        }
      }, 2100);

      // ── DISMISS: click or auto ──
      const dismiss = () => {
        overlay.classList.remove('active');
        overlay.removeEventListener('click', dismiss);
        showToast(rank);
      };
      setTimeout(() => overlay.addEventListener('click', dismiss), 2500);
      setTimeout(dismiss, 5500);
    }

    function showToast(rank) {
      document.getElementById('toastIcon').innerHTML = RANK_ICONS[rank.name] || '';
      document.getElementById('toastName').textContent = rank.name;
      document.getElementById('toastName').style.color = rank.color;
      const toast = document.getElementById('levelupToast');
      toast.style.borderColor = rank.color + '55';
      toast.style.boxShadow = `0 16px 48px rgba(0,0,0,0.8), 0 0 30px ${rank.glow}`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3500);
    }

    // ── ADD XP ────────────────────────────────────────────────────
    function addXp(amount, videoId) {
      const { xp, downloads, history } = getStats();
      const oldIdx = getRankIdx(xp);
      const newXp = xp + amount;
      const newIdx = getRankIdx(newXp);
      saveStats(newXp, downloads + 1, history);

      spawnXpPopup(amount, RANKS[newIdx].color);
      spawnParticles(RANKS[newIdx].color);
      renderRank(true);

      if (newIdx > oldIdx) {
        setTimeout(() => showRankUpOverlay(RANKS[newIdx], amount), 300);
      }
    }

    // ── DUPLICATE CHECK ───────────────────────────────────────────
    function isNewVideo(videoId) {
      const { history } = getStats();
      return !history.includes(videoId);
    }

    function markVideoDownloaded(videoId) {
      const { xp, downloads, history } = getStats();
      if (!history.includes(videoId)) {
        history.push(videoId);
        saveStats(xp, downloads, history);
      }
    }

    // ── INIT ──────────────────────────────────────────────────────
    renderRank();

    // ── KEY ROTATION ─────────────────────────────────────────────
    const STORAGE_KEY = 'ytdl_exhausted';
    const DAY_KEY = 'ytdl_day';
    function getExhausted() {
      const today = new Date().toISOString().slice(0,10);
      if (localStorage.getItem(DAY_KEY) !== today) {
        localStorage.setItem(DAY_KEY, today);
        localStorage.removeItem(STORAGE_KEY);
        return new Set();
      }
      const s = localStorage.getItem(STORAGE_KEY);
      return s ? new Set(JSON.parse(s)) : new Set();
    }
    function markExhausted(key) { const e = getExhausted(); e.add(key); localStorage.setItem(STORAGE_KEY, JSON.stringify([...e])); }
    function getNextKey() { const e = getExhausted(); return RAPIDAPI_KEYS.find(k => !e.has(k)) || null; }

    // ── XP HELPERS ───────────────────────────────────────────────
    function formatXP(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(n % 1000000 === 0 ? 0 : 1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(n % 1000 === 0 ? 0 : 1) + 'K';
      return n.toString();
    }

    function calcXP(durationSeconds) {
      // Base: 500 XP for any download
      // +1 XP per 2 seconds of video (so 10min = +300, 1hr = +1800)
      // Bonus tiers: short <3min=500, medium 3-10min=1000, long 10-30min=2000, epic 30min+=4000
      const s = durationSeconds || 0;
      let xp = 500;
      if (s < 180)       xp = 500;
      else if (s < 600)  xp = 1000;
      else if (s < 1800) xp = 2000;
      else if (s < 3600) xp = 3500;
      else               xp = 5000;
      // Extra bonus per minute
      xp += Math.floor(s / 60) * 10;
      return Math.round(xp / 50) * 50; // round to nearest 50
    }

    // ── HELPERS ───────────────────────────────────────────────────
    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      el.innerHTML = type === 'loading' ? `<div class="spinner"></div>${msg}` : msg;
    }
    function extractVideoId(url) {
      try {
        const u = new URL(url);
        if (u.hostname.includes('youtu.be')) return u.pathname.slice(1).split('?')[0];
        return u.searchParams.get('v');
      } catch { return null; }
    }
    function formatDuration(s) {
      if (!s) return '';
      const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
      return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${m}:${String(sec).padStart(2,'0')}`;
    }

    // ── API FETCH ─────────────────────────────────────────────────
    async function pollProgress(progressUrl) {
      for (let i = 0; i < 60; i++) {
        await new Promise(r => setTimeout(r, 1000));
        const res = await fetch(progressUrl).catch(() => null);
        if (!res || !res.ok) continue;
        const data = await res.json().catch(() => null);
        if (!data) continue;
        const dlUrl = data.download_url || data.url || data.link || data.result?.url || data.file?.url || null;
        if (dlUrl) return dlUrl;
        const progress = data.progress ?? data.percent ?? -1;
        if (progress >= 100) return data.download_url || data.url || null;
        const status = (data.status || data.state || '').toLowerCase();
        if (['done','finished','complete','completed','success'].includes(status)) return data.download_url || data.url || null;
      }
      return null;
    }

    const RENDER_API = 'https://ytdl-api-s34k.onrender.com';

    async function fetchWithRotation(videoUrl) {
      setStatus('Fetching video info...', 'loading');
      const res = await fetch(`${RENDER_API}/info?url=${encodeURIComponent(videoUrl)}`);
      if (!res.ok) throw new Error('API error. Try again.');
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      if (!data.formats || data.formats.length === 0) throw new Error('No formats found.');
      currentVideoDuration = parseInt(data.duration || '0');
      return data.formats.map(f => ({
        label: f.label,
        ext: 'MP4',
        isAudio: false,
        dlUrl: `${RENDER_API}/download?url=${encodeURIComponent(videoUrl)}&height=${f.height}&title=${encodeURIComponent(data.title || 'video')}`,
        title: data.title || '',
        thumbnail: data.thumbnail || '',
        duration: data.duration || '0'
      }));
    }

    // ── MAIN FETCH ────────────────────────────────────────────────
    let currentVideoId = null;
    let currentVideoDuration = 0;

    async function fetchVideo() {
      const url = document.getElementById('urlInput').value.trim();
      const panel = document.getElementById('resultPanel');
      const dupWarn = document.getElementById('dupWarning');

      if (!url) { setStatus('Please enter a YouTube URL.', 'error'); return; }
      const videoId = extractVideoId(url);
      if (!videoId) { setStatus('Invalid YouTube URL.', 'error'); return; }

      currentVideoId = videoId;
      dupWarn.style.display = 'none';

      panel.classList.remove('visible');
      document.getElementById('fetchBtn').disabled = true;
      setStatus('Starting...', 'loading');

      try {
        const results = await fetchWithRotation(url);
        const first = results[0];

        document.getElementById('videoTitle').textContent = first.title || 'Unknown title';
        document.getElementById('videoDuration').textContent = first.duration ? formatDuration(parseInt(first.duration)) : '';
        document.getElementById('thumb').src = first.thumbnail || `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;

        const grid = document.getElementById('formatsGrid');
        grid.innerHTML = '';

        results.forEach(f => {
          const row = document.createElement('div');
          row.className = 'format-row';
          row.innerHTML = `
            <div class="format-info">
              <span class="format-quality">${f.label}</span>
              <span class="format-tag">${f.ext}</span>
            </div>
            <a class="dl-btn" href="${f.dlUrl}" target="_blank" rel="noopener" onclick="handleDownload('${videoId}')">Download</a>`;
          grid.appendChild(row);
        });

        panel.classList.add('visible');
        setStatus('');
      } catch (err) {
        setStatus(err.message, 'error');
      } finally {
        document.getElementById('fetchBtn').disabled = false;
      }
    }

    let pendingRankUp = null;

    function handleDownload(videoId) {
      const dupWarn = document.getElementById('dupWarning');
      if (isNewVideo(videoId)) {
        dupWarn.style.display = 'none';
        markVideoDownloaded(videoId);
        const xpAmount = calcXP(currentVideoDuration);
        pendingRankUp = { xpAmount, videoId };
      } else {
        dupWarn.style.display = 'flex';
      }
    }

    // Show rank up when user returns to tab
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && pendingRankUp) {
        setTimeout(() => {
          addXp(pendingRankUp.xpAmount, pendingRankUp.videoId);
          pendingRankUp = null;
        }, 500);
      }
    });

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchVideo();
    });
  </script>
</body>
