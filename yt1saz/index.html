<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ytfromdl</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --card: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.08); --card-hover: rgba(255,255,255,0.08);
      --text: #f0f0f0; --muted: rgba(255,255,255,0.35);
      --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.35);
      --red: #ef4444; --radius: 16px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 20px 100px; position: relative; overflow-x: hidden;
    }
    .blob { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; opacity: 0.15; }
    .blob-1 { width: 600px; height: 600px; background: #1d4ed8; top: -150px; left: -200px; }
    .blob-2 { width: 500px; height: 500px; background: #6d28d9; bottom: -100px; right: -150px; }
    .container { width: 100%; max-width: 560px; position: relative; z-index: 1; }

    /* HEADER */
    header { margin-bottom: 28px; animation: fadeUp 0.5s ease both; }
    .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 0 20px var(--accent-glow); }
    .logo-icon svg { width: 18px; height: 18px; fill: #fff; }
    h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .subtitle { font-size: 13px; color: var(--muted); padding-left: 48px; }

    /* ═══ RANK CARD ═══ */
    .rank-card {
      border-radius: 20px; padding: 22px 22px 18px;
      margin-bottom: 16px; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      animation: fadeUp 0.5s ease 0.05s both; position: relative; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      transition: border-color 0.6s, box-shadow 0.6s;
      background: rgba(255,255,255,0.04);
    }
    .rank-card-glow {
      position: absolute; inset: 0; opacity: 0.06; pointer-events: none;
      transition: opacity 0.6s;
    }
    .rank-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .rank-left { display: flex; align-items: center; gap: 16px; }
    .rank-icon-wrap { width: 68px; height: 68px; flex-shrink: 0; transition: filter 0.6s; }
    .rank-icon-wrap svg { width: 100%; height: 100%; }
    .rank-icon-wrap.pop { animation: iconPop 0.65s cubic-bezier(0.175,0.885,0.32,1.4) forwards; }
    .rank-info { }
    .rank-tier-label { font-size: 9px; font-weight: 800; letter-spacing: 3.5px; text-transform: uppercase; opacity: 0.4; margin-bottom: 4px; }
    .rank-name { font-size: 22px; font-weight: 900; letter-spacing: -0.8px; transition: color 0.5s; line-height: 1; }
    .rank-sub { font-size: 11px; color: var(--muted); margin-top: 5px; }
    .rank-right { text-align: right; }
    .rank-dl-num { font-size: 36px; font-weight: 900; line-height: 1; letter-spacing: -1px; }
    .rank-dl-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

    /* Pip bars */
    .rank-pips { display: flex; gap: 6px; margin-bottom: 14px; }
    .pip { height: 5px; flex: 1; border-radius: 100px; background: rgba(255,255,255,0.09); transition: background 0.5s, box-shadow 0.5s; }

    /* XP Bar */
    .xp-bar-track { background: rgba(255,255,255,0.07); border-radius: 100px; height: 10px; overflow: hidden; position: relative; }
    .xp-bar-fill { height: 100%; border-radius: 100px; position: relative; transition: width 1.3s cubic-bezier(0.22,1,0.36,1); min-width: 6px; }
    .xp-bar-fill::after { content: ''; position: absolute; top: 0; left: -100%; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent); animation: shimmer 2.2s infinite; }
    .xp-bar-labels { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: var(--muted); }

    /* ═══ LEVEL UP OVERLAY ═══ */
    .rankup-overlay {
      position: fixed; inset: 0; z-index: 900; pointer-events: none;
      display: flex; align-items: center; justify-content: center; opacity: 0;
    }
    .rankup-overlay.show { animation: overlayIn 2.8s ease forwards; }
    .rankup-flash { position: absolute; inset: 0; opacity: 0; animation: none; }
    .rankup-overlay.show .rankup-flash { animation: flashPulse 2.8s ease forwards; }
    .rankup-center {
      position: relative; text-align: center; opacity: 0;
    }
    .rankup-overlay.show .rankup-center { animation: rankupBounce 2.8s ease forwards; }
    .rankup-big-icon { width: 110px; height: 110px; margin: 0 auto 16px; filter: drop-shadow(0 0 30px var(--rc2, gold)); }
    .rankup-big-icon svg { width: 100%; height: 100%; }
    .rankup-label { font-size: 11px; font-weight: 800; letter-spacing: 5px; text-transform: uppercase; opacity: 0.6; }
    .rankup-rank-name { font-size: 40px; font-weight: 900; letter-spacing: -1.5px; margin-top: 6px; }
    .rankup-sub { font-size: 13px; color: var(--muted); margin-top: 8px; }

    /* ═══ TOAST ═══ */
    .levelup-toast {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-140px);
      border-radius: 18px; padding: 14px 24px 14px 14px;
      display: flex; align-items: center; gap: 14px; z-index: 1000;
      transition: transform 0.6s cubic-bezier(0.175,0.885,0.32,1.275);
      box-shadow: 0 16px 48px rgba(0,0,0,0.8); white-space: nowrap;
      background: #111118; border: 1px solid rgba(255,255,255,0.12);
    }
    .levelup-toast.show { transform: translateX(-50%) translateY(0); }
    .toast-icon { width: 48px; height: 48px; flex-shrink: 0; }
    .toast-icon svg { width: 100%; height: 100%; }
    .toast-label { font-size: 9px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; opacity: 0.45; }
    .toast-name { font-size: 20px; font-weight: 900; margin-top: 2px; }

    /* XP Float + Particles */
    .xp-popup { position: fixed; pointer-events: none; z-index: 999; font-size: 22px; font-weight: 900; letter-spacing: -0.5px; animation: xpFloat 1.5s cubic-bezier(0.22,1,0.36,1) forwards; opacity: 0; }
    .particle { position: fixed; pointer-events: none; z-index: 998; border-radius: 50%; animation: particleFly var(--dur,0.9s) ease forwards; opacity: 0; }

    /* Duplicate warning */
    .dup-warning { font-size: 12px; color: #f59e0b; display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); border-radius: 8px; margin-bottom: 8px; display: none; }

    /* SEARCH */
    .search-card { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 20px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); margin-bottom: 12px; animation: fadeUp 0.5s ease 0.15s both; }
    .input-row { display: flex; gap: 10px; }
    input[type="text"] { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 16px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s, background 0.2s; }
    input[type="text"]:focus { border-color: var(--accent); background: rgba(59,130,246,0.07); }
    input::placeholder { color: var(--muted); }
    .fetch-btn { background: var(--accent); border: none; border-radius: 10px; padding: 12px 22px; font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; color: #fff; cursor: pointer; white-space: nowrap; transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s; box-shadow: 0 4px 16px var(--accent-glow); }
    .fetch-btn:hover { opacity: 0.88; }
    .fetch-btn:active { transform: scale(0.97); }
    .fetch-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
    .status { font-size: 13px; color: var(--muted); min-height: 18px; display: flex; align-items: center; gap: 8px; padding: 0 4px; margin-bottom: 20px; }
    .status.error { color: var(--red); }
    .spinner { width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }

    /* RESULTS */
    .result-panel { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius); overflow: hidden; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: none; animation: fadeUp 0.35s ease both; }
    .result-panel.visible { display: block; }
    .video-info { display: flex; gap: 14px; padding: 18px 18px 16px; border-bottom: 1px solid var(--card-border); }
    .video-thumb { width: 118px; height: 66px; object-fit: cover; border-radius: 8px; flex-shrink: 0; background: rgba(255,255,255,0.06); }
    .video-meta { flex: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: center; gap: 5px; }
    .video-title { font-size: 14px; font-weight: 500; line-height: 1.45; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .video-duration { font-size: 12px; color: var(--muted); }
    .formats-header { padding: 16px 18px 8px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .formats-list { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 5px; }
    .format-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; transition: background 0.15s, border-color 0.15s; }
    .format-row:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.12); }
    .format-info { display: flex; align-items: center; gap: 10px; }
    .format-quality { font-size: 13px; font-weight: 700; color: var(--text); min-width: 40px; }
    .format-tag { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 5px; background: rgba(59,130,246,0.15); color: #60a5fa; }
    .dl-btn { padding: 7px 16px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-block; transition: background 0.15s, color 0.15s, border-color 0.15s; white-space: nowrap; }
    .dl-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .note { margin-top: 16px; font-size: 12px; color: rgba(255,255,255,0.15); text-align: center; }

    /* ANIMATIONS */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer { to { left: 200%; } }
    @keyframes iconPop {
      0%   { transform: scale(1) rotate(0deg); }
      20%  { transform: scale(0.75) rotate(-12deg); }
      55%  { transform: scale(1.65) rotate(10deg); }
      75%  { transform: scale(0.93) rotate(-4deg); }
      90%  { transform: scale(1.06) rotate(2deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    @keyframes xpFloat {
      0%   { opacity: 0; transform: translateY(8px) scale(0.6); }
      12%  { opacity: 1; transform: translateY(0) scale(1.15); }
      55%  { opacity: 1; transform: translateY(-60px) scale(1.05); }
      100% { opacity: 0; transform: translateY(-100px) scale(0.7); }
    }
    @keyframes particleFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1.2); }
      100% { opacity: 0; transform: translate(var(--tx,0px), var(--ty,-80px)) scale(0); }
    }
    @keyframes overlayIn { 0%,100% { opacity: 0; } 10%,80% { opacity: 1; } }
    @keyframes flashPulse { 0% { opacity: 0; } 15% { opacity: 0.18; } 60% { opacity: 0.08; } 100% { opacity: 0; } }
    @keyframes rankupBounce {
      0%   { opacity: 0; transform: scale(0.2) translateY(40px); }
      25%  { opacity: 1; transform: scale(1.12) translateY(-10px); }
      40%  { transform: scale(0.96) translateY(5px); }
      55%  { transform: scale(1.04) translateY(-3px); }
      70%  { transform: scale(1) translateY(0); opacity: 1; }
      85%  { opacity: 1; }
      100% { opacity: 0; transform: scale(1.05) translateY(-10px); }
    }
    @keyframes cardGlow {
      0%   { box-shadow: 0 0 0 0 var(--rc, gold); }
      35%  { box-shadow: 0 0 40px 10px var(--rc, gold); }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
    .rank-card.pulse { animation: cardGlow 1s ease forwards; }
  </style>
</head>
<body>

    // ══════════════════════════════════════════════════════════════
    //  RANK DATA
    // ══════════════════════════════════════════════════════════════
    const TIERS = [
      { label: 'Bronze',   color: '#cd7f32', glow: 'rgba(205,127,50,0.5)',  bar: 'linear-gradient(90deg,#8b4513,#cd7f32)',  xp: [5,  10, 15]  },

      { label: 'Gold',     color: '#ffd700', glow: 'rgba(255,215,0,0.5)',   bar: 'linear-gradient(90deg,#b8860b,#ffd700)',  xp: [55, 70, 90]  },
      { label: 'Platinum', color: '#40e0d0', glow: 'rgba(64,224,208,0.5)',  bar: 'linear-gradient(90deg,#008080,#40e0d0)',  xp: [110,140,175] },
      { label: 'Diamond',  color: '#60a5fa', glow: 'rgba(96,165,250,0.5)',  bar: 'linear-gradient(90deg,#1d4ed8,#93c5fd)',  xp: [220,275,340] },
      { label: 'Elite',    color: '#f472b6', glow: 'rgba(244,114,182,0.6)', bar: 'linear-gradient(90deg,#7c3aed,#f472b6)',  xp: [420,510,9999]},
    ];

    const RANKS = [];
    const NUMS = ['I','II','III'];
    TIERS.forEach(t => {
      NUMS.forEach((num, i) => {
        RANKS.push({ name: `${t.label} ${num}`, tier: t.label, tierIdx: TIERS.indexOf(t), subIdx: i, color: t.color, glow: t.glow, bar: t.bar, xpNeeded: t.xp[i] });
      });
    });

    // ── STAT HELPERS ─────────────────────────────────────────────
    function getStats() {
      return {
        xp: parseInt(localStorage.getItem('ytdl_xp')||'0'),
        downloads: parseInt(localStorage.getItem('ytdl_downloads')||'0'),
        history: JSON.parse(localStorage.getItem('ytdl_history')||'[]'),
      };
    }
    function saveStats(xp, downloads, history) {
      localStorage.setItem('ytdl_xp', xp);
      localStorage.setItem('ytdl_downloads', downloads);
      localStorage.setItem('ytdl_history', JSON.stringify(history));
    }
    function getRankIdx(xp) {
      let cum = 0;
      for (let i = 0; i < RANKS.length; i++) {
        cum += RANKS[i].xpNeeded;
        if (xp < cum) return i;
      }
      return RANKS.length - 1;
    }
    function getXpInRank(xp, idx) {
      let cum = 0;
      for (let i = 0; i < idx; i++) cum += RANKS[i].xpNeeded;
      return xp - cum;
    }

    // ── RENDER RANK ───────────────────────────────────────────────
    function renderRank(animate = false) {
      const { xp, downloads } = getStats();
      const idx = getRankIdx(xp);
      const rank = RANKS[idx];
      const xpIn = getXpInRank(xp, idx);
      const pct = rank.xpNeeded >= 9999 ? 100 : Math.min(100, (xpIn / rank.xpNeeded) * 100);
      const left = rank.xpNeeded >= 9999 ? '∞' : rank.xpNeeded - xpIn;

      // Text
      document.getElementById('rankTierLabel').textContent = rank.tier;
      document.getElementById('rankName').textContent = rank.name;
      document.getElementById('rankName').style.color = rank.color;
      document.getElementById('rankSub').textContent = `${xp} XP • ${downloads} downloads`;
      document.getElementById('dlCount').textContent = downloads;
      document.getElementById('xpLabel').textContent = `${xpIn} / ${rank.xpNeeded >= 9999 ? '∞' : rank.xpNeeded} XP`;
      document.getElementById('xpNext').textContent = rank.xpNeeded >= 9999 ? '👑 MAX RANK' : `${left} XP to next`;

      // XP bar
      const fill = document.getElementById('xpBarFill');
      fill.style.background = rank.bar;
      fill.style.boxShadow = `0 0 14px ${rank.glow}`;
      fill.style.width = pct + '%';

      // Card
      const card = document.getElementById('rankCard');
      card.style.setProperty('--rc', rank.color);
      card.style.borderColor = rank.color + '44';

      // Card glow bg
      const glow = document.getElementById('rankCardGlow');
      glow.style.background = `radial-gradient(ellipse at 20% 20%, ${rank.color}, transparent 65%)`;

      // Icon
      const iconWrap = document.getElementById('rankIconWrap');
      iconWrap.innerHTML = RANK_ICONS[rank.name] || RANK_ICONS['Bronze I'];
      iconWrap.style.filter = `drop-shadow(0 0 12px ${rank.glow})`;

      // Pips (3 bars for I/II/III)
      const pipsEl = document.getElementById('rankPips');
      pipsEl.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const p = document.createElement('div');
        p.className = 'pip';
        if (i <= rank.subIdx) {
          p.style.background = rank.bar;
          p.style.boxShadow = `0 0 8px ${rank.glow}`;
        }
        pipsEl.appendChild(p);
      }

      if (animate) {
        iconWrap.classList.remove('pop');
        void iconWrap.offsetWidth;
        iconWrap.classList.add('pop');
        card.classList.remove('pulse');
        void card.offsetWidth;
        card.classList.add('pulse');
      }
    }

    // ── XP POPUP + PARTICLES ──────────────────────────────────────
    function spawnXpPopup(xp, color) {
      const el = document.createElement('div');
      el.className = 'xp-popup';
      el.textContent = `+${xp} XP`;
      el.style.color = color;
      el.style.textShadow = `0 0 16px ${color}`;
      el.style.left = (150 + Math.random() * 200) + 'px';
      el.style.top = '340px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1600);
    }

    function spawnParticles(color) {
      for (let i = 0; i < 14; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = (i / 14) * 360;
        const dist = 40 + Math.random() * 60;
        const tx = Math.cos(angle * Math.PI / 180) * dist;
        const ty = Math.sin(angle * Math.PI / 180) * dist - 40;
        p.style.setProperty('--tx', tx + 'px');
        p.style.setProperty('--ty', ty + 'px');
        p.style.setProperty('--dur', (0.6 + Math.random() * 0.6) + 's');
        p.style.background = color;
        p.style.width = p.style.height = (4 + Math.random() * 5) + 'px';
        p.style.left = (180 + Math.random() * 160) + 'px';
        p.style.top = '390px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1300);
      }
    }

    // ── RANK UP OVERLAY ───────────────────────────────────────────
    function showRankUpOverlay(rank) {
      const overlay = document.getElementById('rankupOverlay');
      const flash = document.getElementById('rankupFlash');
      const bigIcon = document.getElementById('rankupBigIcon');
      const name = document.getElementById('rankupName');
      const sub = document.getElementById('rankupSub');

      bigIcon.innerHTML = RANK_ICONS[rank.name] || '';
      bigIcon.style.setProperty('--rc2', rank.color);
      name.textContent = rank.name;
      name.style.color = rank.color;
      sub.textContent = `Welcome to ${rank.tier}!`;
      flash.style.background = `radial-gradient(ellipse at center, ${rank.color} 0%, transparent 70%)`;

      overlay.classList.remove('show');
      void overlay.offsetWidth;
      overlay.classList.add('show');
      setTimeout(() => overlay.classList.remove('show'), 2900);

      // Also show toast after overlay
      setTimeout(() => showToast(rank), 400);
    }

    function showToast(rank) {
      document.getElementById('toastIcon').innerHTML = RANK_ICONS[rank.name] || '';
      document.getElementById('toastName').textContent = rank.name;
      document.getElementById('toastName').style.color = rank.color;
      const toast = document.getElementById('levelupToast');
      toast.style.borderColor = rank.color + '55';
      toast.style.boxShadow = `0 16px 48px rgba(0,0,0,0.8), 0 0 30px ${rank.glow}`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3500);
    }

    // ── ADD XP ────────────────────────────────────────────────────
    function addXp(amount, videoId) {
      const { xp, downloads, history } = getStats();
      const oldIdx = getRankIdx(xp);
      const newXp = xp + amount;
      const newIdx = getRankIdx(newXp);
      saveStats(newXp, downloads + 1, history);

      spawnXpPopup(amount, RANKS[newIdx].color);
      spawnParticles(RANKS[newIdx].color);
      renderRank(true);

      if (newIdx > oldIdx) {
        setTimeout(() => showRankUpOverlay(RANKS[newIdx]), 300);
      }
    }

    // ── DUPLICATE CHECK ───────────────────────────────────────────
    function isNewVideo(videoId) {
      const { history } = getStats();
      return !history.includes(videoId);
    }

    function markVideoDownloaded(videoId) {
      const { xp, downloads, history } = getStats();
      if (!history.includes(videoId)) {
        history.push(videoId);
        saveStats(xp, downloads, history);
      }
    }

    // ── INIT ──────────────────────────────────────────────────────
    renderRank();

    // ── KEY ROTATION ─────────────────────────────────────────────
    const STORAGE_KEY = 'ytdl_exhausted';
    const DAY_KEY = 'ytdl_day';
    function getExhausted() {
      const today = new Date().toISOString().slice(0,10);
      if (localStorage.getItem(DAY_KEY) !== today) {
        localStorage.setItem(DAY_KEY, today);
        localStorage.removeItem(STORAGE_KEY);
        return new Set();
      }
      const s = localStorage.getItem(STORAGE_KEY);
      return s ? new Set(JSON.parse(s)) : new Set();
    }
    function markExhausted(key) { const e = getExhausted(); e.add(key); localStorage.setItem(STORAGE_KEY, JSON.stringify([...e])); }
    function getNextKey() { const e = getExhausted(); return RAPIDAPI_KEYS.find(k => !e.has(k)) || null; }

    // ── HELPERS ───────────────────────────────────────────────────
    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      el.innerHTML = type === 'loading' ? `<div class="spinner"></div>${msg}` : msg;
    }
    function extractVideoId(url) {
      try {
        const u = new URL(url);
        if (u.hostname.includes('youtu.be')) return u.pathname.slice(1).split('?')[0];
        return u.searchParams.get('v');
      } catch { return null; }
    }
    function formatDuration(s) {
      if (!s) return '';
      const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
      return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${m}:${String(sec).padStart(2,'0')}`;
    }

    // ── API FETCH ─────────────────────────────────────────────────
    async function pollProgress(progressUrl) {
      for (let i = 0; i < 60; i++) {
        await new Promise(r => setTimeout(r, 1000));
        const res = await fetch(progressUrl).catch(() => null);
        if (!res || !res.ok) continue;
        const data = await res.json().catch(() => null);
        if (!data) continue;
        const dlUrl = data.download_url || data.url || data.link || data.result?.url || data.file?.url || null;
        if (dlUrl) return dlUrl;
        const progress = data.progress ?? data.percent ?? -1;
        if (progress >= 100) return data.download_url || data.url || null;
        const status = (data.status || data.state || '').toLowerCase();
        if (['done','finished','complete','completed','success'].includes(status)) return data.download_url || data.url || null;
      }
      return null;
    }

    async function fetchOneFormat(videoUrl, format, isAudio, key) {
      const params = new URLSearchParams({ format, add_info: '0', url: videoUrl, audio_quality: '128', allow_extended_duration: 'false', no_merge: 'false', audio_language: 'en' });
      const res = await fetch(`https://youtube-info-download-api.p.rapidapi.com/ajax/download.php?${params}`, {
        headers: { 'x-rapidapi-host': 'youtube-info-download-api.p.rapidapi.com', 'x-rapidapi-key': key }
      });
      if (!res.ok) return null;
      const data = await res.json().catch(() => null);
      if (!data || !data.success) return null;
      const progressUrl = data.progress_url;
      if (!progressUrl) return null;
      setStatus(`Processing ${format}p...`, 'loading');
      const dlUrl = await pollProgress(progressUrl);
      if (!dlUrl) return null;
      return { label: format + 'p', ext: 'MP4', isAudio, dlUrl, title: data.title || '', thumbnail: data.info?.image || '' };
    }

    async function fetchWithRotation(videoUrl) {
      const key = getNextKey();
      if (!key) throw new Error('Daily limit reached. Try again tomorrow.');
      const results = [];
      for (const fmt of ['1080','720']) {
        const r = await fetchOneFormat(videoUrl, fmt, false, key);
        if (r) results.push(r);
      }
      if (results.length > 0) return results;
      throw new Error('Could not process video. Try again.');
    }

    // ── MAIN FETCH ────────────────────────────────────────────────
    let currentVideoId = null;

    async function fetchVideo() {
      const url = document.getElementById('urlInput').value.trim();
      const panel = document.getElementById('resultPanel');
      const dupWarn = document.getElementById('dupWarning');

      if (!url) { setStatus('Please enter a YouTube URL.', 'error'); return; }
      const videoId = extractVideoId(url);
      if (!videoId) { setStatus('Invalid YouTube URL.', 'error'); return; }

      currentVideoId = videoId;
      dupWarn.style.display = 'none';

      panel.classList.remove('visible');
      document.getElementById('fetchBtn').disabled = true;
      setStatus('Starting...', 'loading');

      try {
        const results = await fetchWithRotation(url);
        const first = results[0];

        document.getElementById('videoTitle').textContent = first.title || 'Unknown title';
        document.getElementById('videoDuration').textContent = '';
        document.getElementById('thumb').src = first.thumbnail || `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;

        const grid = document.getElementById('formatsGrid');
        grid.innerHTML = '';

        results.forEach(f => {
          const row = document.createElement('div');
          row.className = 'format-row';
          row.innerHTML = `
            <div class="format-info">
              <span class="format-quality">${f.label}</span>
              <span class="format-tag">${f.ext}</span>
            </div>
            <a class="dl-btn" href="${f.dlUrl}" download target="_blank" rel="noopener" onclick="handleDownload('${videoId}')">Download</a>`;
          grid.appendChild(row);
        });

        panel.classList.add('visible');
        setStatus('');
      } catch (err) {
        setStatus(err.message, 'error');
      } finally {
        document.getElementById('fetchBtn').disabled = false;
      }
    }

    function handleDownload(videoId) {
      const dupWarn = document.getElementById('dupWarning');
      if (isNewVideo(videoId)) {
        dupWarn.style.display = 'none';
        markVideoDownloaded(videoId);
        addXp(10, videoId);
      } else {
        dupWarn.style.display = 'flex';
      }
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchVideo();
    });
  </script>
</body>
</html>
